services:
  postgres:
    image: postgres:16-alpine
    container_name: immoverwaltung-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: immoverwaltung
      POSTGRES_USER: immo
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD muss in .env gesetzt sein}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immo -d immoverwaltung"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    build: ./backend
    container_name: immoverwaltung-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://immo:${DB_PASSWORD:?DB_PASSWORD muss in .env gesetzt sein}@postgres:5432/immoverwaltung?schema=public"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET muss in .env gesetzt sein}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET muss in .env gesetzt sein}
      PORT: "3001"
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS muss in .env gesetzt sein}
      SEED_DB: ${SEED_DB:-false}
      UPLOAD_DIR: /app/uploads
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY muss in .env gesetzt sein (node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")}
      BCRYPT_COST: ${BCRYPT_COST:-12}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@immoverwalt.de}
      SUPERADMIN_SECRET: ${SUPERADMIN_SECRET:-dev-superadmin-secret}
      SUPERADMIN_JWT_SECRET: ${SUPERADMIN_JWT_SECRET:-dev-superadmin-jwt-secret-min32chars}
    volumes:
      - uploads_data:/app/uploads
    entrypoint: ["sh", "docker-entrypoint.sh"]
    # Port nur intern erreichbar (nginx leitet weiter)
    expose:
      - "3001"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  frontend:
    build: ./cozy-estate-central
    container_name: immoverwaltung-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL-Zertifikate einbinden (z.B. via Certbot: /etc/letsencrypt/live/DOMAIN/)
      # Vor dem ersten Start: certbot certonly --standalone -d DOMAIN
      - ${SSL_CERT_PATH:-./ssl}:/etc/nginx/ssl:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

volumes:
  postgres_data:
  uploads_data:
