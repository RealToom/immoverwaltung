services:
  postgres:
    image: postgres:16-alpine
    container_name: immoverwaltung-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: immoverwaltung
      POSTGRES_USER: immo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-immo_dev_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immo -d immoverwaltung"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: immoverwaltung-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://immo:${DB_PASSWORD:-immo_dev_2026}@postgres:5432/immoverwaltung?schema=public"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-immo-access-secret-dev-2026-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-immo-refresh-secret-dev-2026-change-in-production}
      PORT: "3001"
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      SEED_DB: ${SEED_DB:-false}
    entrypoint: ["sh", "docker-entrypoint.sh"]
    # Port nur intern erreichbar (nginx leitet weiter)
    expose:
      - "3001"

  frontend:
    build: ./cozy-estate-central
    container_name: immoverwaltung-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
