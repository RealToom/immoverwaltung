<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Immoverwalt</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="description" content="Immobilienverwaltung" />

    <meta property="og:title" content="Immoverwalt" />
    <meta property="og:description" content="Immobilienverwaltung" />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <script>
      // Apply saved theme before React renders to prevent flash
      (function() {
        var theme = localStorage.getItem('vite-ui-theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
