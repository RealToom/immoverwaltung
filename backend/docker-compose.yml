services:
  postgres:
    image: postgres:16-alpine
    container_name: immoverwaltung-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: immoverwaltung
      POSTGRES_USER: immo
      POSTGRES_PASSWORD: immo_dev_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
